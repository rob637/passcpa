name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  checks: write

env:
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # Lint and Test (runs on all branches)
  # ============================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test:run
        env:
          NODE_OPTIONS: '--max-old-space-size=7168'

  # ============================================
  # Bundle Size Analysis (on pushes)
  # ============================================
  bundle-analysis:
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle analysis
        run: ANALYZE=true npm run build
        env:
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: 000000000000
          VITE_FIREBASE_APP_ID: placeholder

      - name: Enforce bundle budgets
        run: npm run perf:budget:dist
        env:
          PERF_BUDGET_PROFILE: standard

      - name: Generate budget report JSON
        run: PERF_BUDGET_PROFILE=standard PERF_BUDGET_JSON_OUT=dist/bundle-budget-report.json node scripts/check-bundle-budgets.mjs

      - name: Upload bundle budget report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report
          path: dist/bundle-budget-report.json
          retention-days: 14

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 14

      - name: Write bundle summary
        run: node scripts/write-bundle-summary.mjs --out="$GITHUB_STEP_SUMMARY"

  # ============================================
  # Build for Staging (develop branch → staging)
  # ============================================
  build-staging:
    needs: lint-and-test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Staging
        run: npm run build:staging
        env:
          VITE_ENVIRONMENT: staging
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_STAGING }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY_STAGING }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist/
          retention-days: 7

  # ============================================
  # Build for Production (main branch)
  # ============================================
  build-production:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Production
        run: npm run build:prod
        env:
          VITE_ENVIRONMENT: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_PROD }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_PROD }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_PROD }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_PROD }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_PROD }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY_PROD }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID_PROD }}

      - name: Enforce strict bundle budgets
        run: npm run perf:budget:dist:strict

      - name: Generate strict budget report JSON
        run: PERF_BUDGET_PROFILE=strict PERF_BUDGET_JSON_OUT=dist/bundle-budget-report-strict.json node scripts/check-bundle-budgets.mjs

      - name: Upload strict bundle budget report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-budget-report-strict
          path: dist/bundle-budget-report-strict.json
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 7

  # ============================================
  # Auto-deploy REMOVED — use deploy.yml workflow
  # To deploy: Actions → "Deploy to Environment" → Run workflow
  # Type "DEPLOY STAGING" or "DEPLOY PRODUCTION" to confirm
  # ============================================
