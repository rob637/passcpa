name: Deploy Blog

# This workflow rebuilds the blog with fresh articles from Firestore and deploys to production.
# Run this after publishing new articles via the SEO Engine / Article Review.
#
# Can be triggered:
# 1. Manually via GitHub Actions UI (workflow_dispatch)
# 2. On schedule (daily at 6 AM UTC)
# 3. Via GitHub API

on:
  workflow_dispatch:
    inputs:
      verify_slug:
        description: 'Optional: Slug to verify after deploy'
        required: false
        type: string
  schedule:
    # Run daily at 6 AM UTC (1 AM EST, 10 PM PST)
    - cron: '0 6 * * *'

jobs:
  deploy-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (blog)
        run: cd blog && npm ci

      - name: Export articles from Firestore
        run: node scripts/export-articles.cjs --from-api
        env:
          NODE_ENV: production

      - name: Build main app
        run: npm run build:prod
        env:
          # IMPORTANT: Use _PROD suffixed secrets to match deploy.yml
          # Previous bug: missing _PROD suffix caused empty Firebase config
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_PROD }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_PROD }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_PROD }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_PROD }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_PROD }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID_PROD }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY_PROD }}
          VITE_ENVIRONMENT: production

      - name: Build blog (Astro)
        run: cd blog && npm run build

      - name: Merge blog into dist
        run: npm run merge:blog

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          channelId: live
          projectId: voraprep-prod

      - name: Verify deployment
        if: ${{ github.event.inputs.verify_slug }}
        run: |
          SLUG="${{ github.event.inputs.verify_slug }}"
          echo "Verifying article: $SLUG"
          sleep 10  # Wait for Firebase CDN propagation
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "https://voraprep.com/blog/$SLUG/")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Article is live: https://voraprep.com/blog/$SLUG/"
          else
            echo "❌ Article not found (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Blog Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Articles exported from:** Firestore \`growth_content\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to:** https://voraprep.com/blog/" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.verify_slug }}" ]; then
            echo "- **Verified:** https://voraprep.com/blog/${{ github.event.inputs.verify_slug }}/" >> $GITHUB_STEP_SUMMARY
          fi
