name: Deploy to Environment

# Manual-only deployment — no auto-deploys
# Trigger from GitHub UI or CLI: gh workflow run deploy.yml -f environment=staging -f confirmation="DEPLOY STAGING"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      confirmation:
        description: 'Type "DEPLOY STAGING" or "DEPLOY PRODUCTION" to confirm'
        required: true
        type: string
      deploy_functions:
        description: 'Deploy Cloud Functions (production only)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # Validate confirmation text
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          EXPECTED="DEPLOY $(echo '${{ inputs.environment }}' | tr '[:lower:]' '[:upper:]')"
          ACTUAL="${{ inputs.confirmation }}"
          
          echo "Expected: '$EXPECTED'"
          echo "Received: '$ACTUAL'"
          
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Deployment blocked. You typed '$ACTUAL' but expected '$EXPECTED'"
            exit 1
          fi
          
          echo "✅ Confirmation validated"

  # ============================================
  # Build
  # ============================================
  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & Type Check
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Run Tests
        run: npm run test:run
        env:
          NODE_OPTIONS: '--max-old-space-size=7168'

      - name: Build for Staging
        if: inputs.environment == 'staging'
        run: npm run build:staging
        env:
          VITE_ENVIRONMENT: staging
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_STAGING }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_STAGING }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_STAGING }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_STAGING }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY_STAGING }}

      - name: Build for Production
        if: inputs.environment == 'production'
        run: npm run build:prod
        env:
          VITE_ENVIRONMENT: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_PROD }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_PROD }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_PROD }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_PROD }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_PROD }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY_PROD }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID_PROD }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.environment }}
          path: dist/
          retention-days: 7

  # ============================================
  # Deploy
  # ============================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'production' && 'https://voraprep.com' || 'https://voraprep-staging.web.app' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ inputs.environment }}
          path: dist/

      - name: Verify environment in build
        run: |
          echo "🔍 Verifying build targets correct environment..."
          
          if [[ "${{ inputs.environment }}" == "staging" ]]; then
            if grep -rE 'projectId["\s:]*["\s]*voraprep-prod' dist/assets/*.js 2>/dev/null; then
              echo "❌ ERROR: Production config found in staging build!"
              exit 1
            fi
            echo "✅ Build verified for staging"
          fi
          
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            if grep -rE 'projectId["\s:]*["\s]*passcpa-dev' dist/assets/*.js 2>/dev/null; then
              echo "❌ ERROR: Development config found in production build!"
              exit 1
            fi
            if grep -rE 'projectId["\s:]*["\s]*voraprep-staging' dist/assets/*.js 2>/dev/null; then
              echo "❌ ERROR: Staging config found in production build!"
              exit 1
            fi
            echo "✅ Build verified for production"
          fi

      - name: Deploy Hosting (Staging)
        if: inputs.environment == 'staging'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          channelId: live
          projectId: voraprep-staging

      - name: Deploy Hosting (Production)
        if: inputs.environment == 'production'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          channelId: live
          projectId: voraprep-prod

      - name: Setup Node.js for Functions
        if: inputs.environment == 'production' && inputs.deploy_functions
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy Cloud Functions (Production)
        if: inputs.environment == 'production' && inputs.deploy_functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}' > "${{ runner.temp }}/gcloud-key.json"
          cd functions && npm ci && cd ..
          npx firebase-tools@latest deploy --only functions --project voraprep-prod
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "- **Functions:** ${{ inputs.deploy_functions && 'Deployed' || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://voraprep.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **URL:** https://voraprep-staging.web.app" >> $GITHUB_STEP_SUMMARY
          fi
