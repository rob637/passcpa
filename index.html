    <!--
      Boot guard: self-heal stale-bundle MIME errors.
      If a JS module fails to load (e.g., 404 falls back to index.html and
      browser refuses the wrong MIME), unregister any service worker, clear
      caches, and hard-reload with a cache-buster. Prevents the "Loading..."
      spinner-of-death after a deploy if a stale SW is still around.
      Kept inline so it runs even when the main bundle never executes.
    -->
    <script>
      (function () {
        var healed = false;
        // Cap self-heals per browser-tab session to avoid an infinite reload
        // loop ("blinking" splash) if the underlying chunk really is missing.
        // After this many attempts we let the error surface to the user /
        // ErrorBoundary instead of reloading again.
        var SELF_HEAL_KEY = 'boot-guard-heal-count';
        var MAX_HEALS = 2;
        function getHealCount() {
          try { return parseInt(sessionStorage.getItem(SELF_HEAL_KEY) || '0', 10) || 0; }
          catch (e) { return 0; }
        }
        function bumpHealCount() {
          try { sessionStorage.setItem(SELF_HEAL_KEY, String(getHealCount() + 1)); }
          catch (e) { /* storage unavailable */ }
        }
        function selfHeal(reason) {
          if (healed) return;
          if (getHealCount() >= MAX_HEALS) {
            try { console.warn('[boot-guard] max self-heals reached, surfacing error:', reason); } catch (e) {}
            return;
          }
          healed = true;
          bumpHealCount();
          try { console.warn('[boot-guard] self-healing stale bundle:', reason); } catch (e) {}
          var done = function () {
            var url = window.location.pathname + window.location.search;
            url += (url.indexOf('?') === -1 ? '?' : '&') + '_h=' + Date.now();
            window.location.replace(url);
          };
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister().catch(function(){}); }));
            }).catch(function () {}));
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            tasks.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k).catch(function(){}); }));
            }).catch(function () {}));
          }
          Promise.all(tasks).then(done, done);
          setTimeout(done, 2500);
        }
        window.addEventListener('error', function (ev) {
          var msg = (ev && ev.message) || '';
          var tgt = ev && ev.target;
          var isModuleScript = tgt && tgt.tagName === 'SCRIPT' && (tgt.type === 'module' || /\/assets\/index-.*\.js/.test(tgt.src || ''));
          if (
            /module script/i.test(msg) ||
            /MIME type/i.test(msg) ||
            /Failed to fetch dynamically imported module/i.test(msg) ||
            (isModuleScript && !healed)
          ) {
            selfHeal(msg || 'module-script-load-failed');
          }
        }, true);
        window.addEventListener('unhandledrejection', function (ev) {
          var r = ev && ev.reason;
          var msg = (r && (r.message || r.toString())) || '';
          if (/Failed to fetch dynamically imported module/i.test(msg) || /ChunkLoadError/i.test(msg)) {
            selfHeal(msg);
          }
        });
        // Clear the counter once the app has clearly booted successfully
        // (give it a few seconds to mount). This way the next time the user
        // legitimately needs self-heal after a future deploy, they get the
        // full budget again instead of a one-time-per-tab limit.
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (!healed) {
              try { sessionStorage.removeItem(SELF_HEAL_KEY); } catch (e) {}
            }
          }, 8000);
        });
      })();
    </script>

      @keyframes vp-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .vp-boot-spinner { animation: none; }
      }
