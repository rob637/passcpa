<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradient background -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- Blue accent gradient -->
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    
    <!-- Green accent for badge -->
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#mainBg)"/>
  
  <!-- Decorative gradient orbs -->
  <ellipse cx="150" cy="100" rx="300" ry="200" fill="#2563eb" opacity="0.08"/>
  <ellipse cx="1050" cy="530" rx="350" ry="250" fill="#1d4ed8" opacity="0.08"/>
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="#2563eb" opacity="0.05"/>
  
  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#blueGlow)"/>
  
  <!-- Free Trial Badge (top right) -->
  <g filter="url(#shadow)">
    <rect x="930" y="30" width="230" height="50" rx="25" fill="url(#greenGlow)"/>
    <text x="1045" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">7-DAY FREE TRIAL</text>
  </g>
  
  <!-- Logo Mark -->
  <g transform="translate(600, 130)" filter="url(#glow)">
    <circle cx="0" cy="0" r="50" fill="url(#blueGlow)" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="url(#blueGlow)" opacity="0.3"/>
    <!-- Stylized "V" logo -->
    <path d="M -18 -15 L 0 18 L 18 -15" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Main Title - VoraPrep -->
  <text x="600" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">VoraPrep</text>
  
  <!-- Tagline -->
  <text x="600" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="1">AI-Powered Professional Exam Prep</text>
  
  <!-- Exam badges row -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <!-- CPA -->
    <rect x="155" y="340" width="70" height="36" rx="8" fill="#1e40af" opacity="0.9"/>
    <text x="190" y="365" font-size="16" font-weight="700" fill="white">CPA</text>
    
    <!-- EA -->
    <rect x="240" y="340" width="60" height="36" rx="8" fill="#0d9488" opacity="0.9"/>
    <text x="270" y="365" font-size="16" font-weight="700" fill="white">EA</text>
    
    <!-- CMA -->
    <rect x="315" y="340" width="70" height="36" rx="8" fill="#7c3aed" opacity="0.9"/>
    <text x="350" y="365" font-size="16" font-weight="700" fill="white">CMA</text>
    
    <!-- CIA -->
    <rect x="400" y="340" width="60" height="36" rx="8" fill="#c026d3" opacity="0.9"/>
    <text x="430" y="365" font-size="16" font-weight="700" fill="white">CIA</text>
    
    <!-- CISA -->
    <rect x="475" y="340" width="70" height="36" rx="8" fill="#ea580c" opacity="0.9"/>
    <text x="510" y="365" font-size="16" font-weight="700" fill="white">CISA</text>
    
    <!-- CFP -->
    <rect x="560" y="340" width="60" height="36" rx="8" fill="#16a34a" opacity="0.9"/>
    <text x="590" y="365" font-size="16" font-weight="700" fill="white">CFP</text>
    
    <!-- Divider -->
    <rect x="640" y="345" width="2" height="26" fill="#475569"/>
    
    <!-- More coming text -->
    <text x="720" y="365" font-size="14" font-weight="500" fill="#64748b">+ More Coming</text>
  </g>
  
  <!-- Stats row -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <!-- Questions -->
    <text x="280" y="440" font-size="36" font-weight="700" fill="white">35,000+</text>
    <text x="280" y="470" font-size="16" font-weight="500" fill="#64748b" letter-spacing="1">QUESTIONS</text>
    
    <!-- Divider -->
    <rect x="430" y="420" width="2" height="60" fill="#334155"/>
    
    <!-- Lessons -->
    <text x="600" y="440" font-size="36" font-weight="700" fill="white">2,500+</text>
    <text x="600" y="470" font-size="16" font-weight="500" fill="#64748b" letter-spacing="1">LESSONS</text>
    
    <!-- Divider -->
    <rect x="768" y="420" width="2" height="60" fill="#334155"/>
    
    <!-- AI Tutor -->
    <text x="920" y="440" font-size="36" font-weight="700" fill="white">24/7</text>
    <text x="920" y="470" font-size="16" font-weight="500" fill="#64748b" letter-spacing="1">AI TUTOR</text>
  </g>
  
  <!-- CTA Button -->
  <g filter="url(#shadow)">
    <rect x="400" y="510" width="400" height="60" rx="30" fill="url(#blueGlow)"/>
    <text x="600" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">Start Your Free Trial</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#64748b" text-anchor="middle">2026 Exam Blueprints • Adaptive Learning • 97% Cheaper</text>
  
  <!-- Website URL -->
  <text x="40" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#2563eb">voraprep.com</text>
</svg>
